notes: >-
  Truora ships client SDKs for its mobile identity-capture / validation flows.
  The historical iOS (TruoraSDK) and Flutter (TruoraFlutterSDK) SDKs are archived;
  the maintained mobile surface is truora-validations-sdk (Swift) plus the Android
  artifact on Maven Central. There is no first-party server-side SDK for the REST
  Checks/Validators/Digital-Identity/Account APIs — those are called directly over
  HTTP with the Truora-API-Key header. The Truora Pass browser SDK (client.js) is a
  hosted embeddable and is catalogued in components/ rather than here.
